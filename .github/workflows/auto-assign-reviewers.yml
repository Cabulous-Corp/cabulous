name: Sync reviewers to assignees

on:
  pull_request:
    types: [opened, ready_for_review, reopened, review_requested]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync reviewers -> assignees
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            // Busca reviewers atualmente solicitados na PR
            const { data } = await github.rest.pulls.listRequestedReviewers({
              owner,
              repo,
              pull_number
            });

            const reviewers = (data.users || []).map(user => user.login);

            // Substitui os assignees da PR pelos reviewers atuais
            await github.rest.issues.update({
              owner,
              repo,
              issue_number: pull_number,
              assignees: reviewers
            });

            core.info(
              reviewers.length
                ? `Assignees sincronizados com reviewers: ${reviewers.join(", ")}`
                : "Nenhum reviewer solicitado. Assignees limpos."
            );
