name: Sync reviewers to assignees

on:
  pull_request:
    types: [opened, ready_for_review, reopened, review_requested]

permissions:
  pull-requests: write
  issues: write

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Sync reviewers -> assignees
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const { data } = await github.rest.pulls.listRequestedReviewers({
              owner,
              repo,
              pull_number
            });

            const reviewers = (data.users || []).map(user => user.login);

            try {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: pull_number,
                assignees: reviewers
              });

              core.info(
                reviewers.length
                  ? `Assignees sincronizados com reviewers: ${reviewers.join(", ")}`
                  : "Nenhum reviewer solicitado. Assignees limpos."
              );
            } catch (error) {
              core.warning(`Não foi possível sincronizar assignees: ${error.message}`);
            }
