services:
  web:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    command: ["sh", "./docker/app/start.sh"]
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=5)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DATABASE__NAME:-cabulous}
      POSTGRES_USER: ${DATABASE__USER:-cabulous}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD:-cabulous}
    ports:
      - "${DATABASE__HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE__USER:-cabulous} -d ${DATABASE__NAME:-cabulous}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS__HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cabulous}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cabulous123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_API_PORT: ${MINIO_API_PORT:-9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cabulous}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cabulous123}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-cabulous-media}
      MINIO_BUCKET_PUBLIC: ${MINIO_BUCKET_PUBLIC:-false}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:$${MINIO_API_PORT} $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/$${MINIO_BUCKET_NAME};
      if [ \"$${MINIO_BUCKET_PUBLIC}\" = \"true\" ]; then
        mc anonymous set download local/$${MINIO_BUCKET_NAME};
      fi;
      exit 0;
      "

  worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    command: ["uv", "run", "celery", "-A", "cabulous", "worker", "--loglevel=info"]
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  beat:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    command:
      [
        "uv",
        "run",
        "celery",
        "-A",
        "cabulous",
        "beat",
        "--loglevel=info",
        "--schedule=/tmp/celerybeat-schedule",
      ]
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  flower:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    command:
      [
        "uv",
        "run",
        "flower",
        "--app=cabulous",
        "--port=5555",
      ]
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
  minio_data:
