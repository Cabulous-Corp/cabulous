services:
  web:
    healthcheck:
      disable: true
    command:
      [
        "sh",
        "-c",
        "uv run python manage.py migrate && uv run python manage.py runserver 0.0.0.0:8000",
      ]
    environment:
      DJANGO_WATCHMAN_TIMEOUT: "10"

  worker:
    command:
      [
        "uv",
        "run",
        "watchfiles",
        "--filter",
        "python",
        "uv run celery -A cabulous worker --loglevel=info --pool=solo",
        "/app",
      ]

  beat:
    command:
      [
        "uv",
        "run",
        "watchfiles",
        "--filter",
        "python",
        "uv run celery -A cabulous beat --loglevel=info --schedule=/tmp/celerybeat-schedule",
        "/app",
      ]

  flower:
    command:
      [
        "uv",
        "run",
        "watchfiles",
        "--filter",
        "python",
        "uv run python -m flower -A cabulous flower --port=5555",
        "/app",
      ]
